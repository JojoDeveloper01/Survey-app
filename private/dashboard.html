<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Protected survey responses dashboard for Joseth Balcazar Survey App.">
    <title>Survey Responses Dashboard</title>
    <style>
        .dashboard-container {
            width: 70%;
            margin-inline: auto;
            border-radius: 16px;
            overflow: hidden;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: #fff;
            color: black;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        tr:nth-child(even) {
            background: #f7f7f7;
        }

        @media (max-width: 1200px) {
            .dashboard-container {
                width: 95%;
            }
        }
    </style>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <nav class="top-nav">
        <a href="https://josethbalcazar.com/" data-i18n="nav.home">Main portfolio</a>
        <a href="/" data-i18n="nav.survey">Survey page</a>
    </nav>

    <div class="dashboard-container">
        <h1 data-i18n="dashboard.title">Survey Responses Dashboard</h1>
        <div class="table-responsive">
            <table id="responses-table">
                <thead>
                    <tr>
                        <th data-i18n="dashboard.id">ID</th>
                        <th data-i18n="dashboard.submittedAt">Submitted At</th>
                        <th data-i18n="dashboard.responseData">Response Data</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="3" data-i18n="dashboard.loading">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initTradux } from 'https://esm.sh/tradux@1.5.10/browser';

        const tradux = await initTradux();
        const t = tradux.t;
        document.documentElement.lang = tradux.currentLanguage;
        document.title = t.dashboard.title;
        document.querySelectorAll('[data-i18n]').forEach((element) => {
            const value = element.dataset.i18n.split('.').reduce((acc, key) => acc?.[key], t);
            if (value) element.textContent = value;
        });

        fetch('api/responses')
            .then(res => res.json())
            .then(data => {
                const tbody = document.querySelector('#responses-table tbody');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3">${t.dashboard.empty}</td></tr>`;
                    return;
                }
                data.forEach(resp => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${resp.id}</td>
                        <td>${resp.submitted_at}</td>
                        <td>${formatAnswers(resp.data)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });

        function formatAnswers(obj) {
            if (!obj || typeof obj !== 'object') return '';
            let html = '<ul style="margin:0;padding-left:1.2em">';
            for (const key in obj) {
                let val = obj[key];
                if (Array.isArray(val)) val = val.join(', ');
                if (typeof val === 'object' && val !== null) val = JSON.stringify(val);
                html += `<li><strong>${key}:</strong> ${val}</li>`;
            }
            html += '</ul>';
            return html;
        }
    </script>
</body>

</html>
